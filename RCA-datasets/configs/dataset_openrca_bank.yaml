name: openrca_bank
raw_dataset_path: tasks/openrca/Bank
telemetry_root: telemetry/openrca/openrca_bank
task_id_template: task_7-{idx}
task_dir_template: '{telemetry_root}/task_7-{idx}'
gt_tz_offset_hours: 8
instruction_tz_offset_hours: 8
reasons:
- high CPU usage
- high memory usage
- network latency
- network packet loss
- high disk I/O read usage
- high disk space usage
- high JVM CPU load
- JVM Out of Memory (OOM) Heap
answer_candidates:
- IG01
- IG02
- MG01
- MG02
- Mysql01
- Mysql02
- Redis01
- Redis02
- Tomcat01
- Tomcat02
- Tomcat03
- Tomcat04
- apache01
- apache02
components:
  node:
  - apache01
  - apache02
  - Tomcat01
  - Tomcat02
  - Tomcat03
  - Tomcat04
  - MG01
  - MG02
  - IG01
  - IG02
  - Mysql01
  - Mysql02
  - Redis01
  - Redis02
  pod:
  - dockerA1
  - dockerA2
  - dockerB1
  - dockerB2
  jvm:
  - MG01
  - MG02
  - IG01
  - IG02
  service:
  - ServiceTest1
  - ServiceTest2
  - ServiceTest3
  - ServiceTest4
  - ServiceTest5
  - ServiceTest6
  - ServiceTest7
  - ServiceTest8
  - ServiceTest9
  - ServiceTest10
  - ServiceTest11
hw_edges: {}  # hardware/host co-location (host -> [components]); empty = no data
call_edges:
  IG01: [Tomcat01, Tomcat02, Tomcat03, Tomcat04]
  IG02: [Tomcat01, Tomcat02, Tomcat03, Tomcat04]
  MG01: [dockerA1, dockerA2, dockerB1, dockerB2]
  MG02: [dockerA1, dockerA2, dockerB1, dockerB2]
  Tomcat01: [MG01, MG02]
  Tomcat02: [MG01, MG02]
  Tomcat03: [MG01, MG02]
  Tomcat04: [MG01, MG02]
  dockerA1: [MG01, MG02]
  dockerA2: [MG01, MG02]
  dockerB1: [MG01, MG02]
  dockerB2: [MG01, MG02]

