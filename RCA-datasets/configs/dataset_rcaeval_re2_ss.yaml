name: rcaeval_re2_ss
raw_dataset_path: tasks/rcaeval/ss
telemetry_root: telemetry/rcaeval/re2-ss
task_id_template: '{task_id}'
task_dir_template: '{telemetry_root}/{idx:04d}'
gt_tz_offset_hours: 0
reasons:
- high CPU usage
- high memory usage
- high disk I/O usage
- network latency
- network packet loss
- socket error
components:
  sock_shop:
  - carts
  - carts-db
  - catalogue
  - catalogue-db
  - front-end
  - istio-init
  - orders
  - orders-db
  - payment
  - queue-master
  - rabbitmq
  - rabbitmq-exporter
  - session-db
  - shipping
  - user
  - user-db
answer_candidates:
- carts
- catalogue
- orders
- payment
- user
hw_edges: {}  # hardware/host co-location (host -> [components]); empty = no data
call_edges:
  front-end: [carts, catalogue, orders, user]
  orders: [carts, orders-db, payment, shipping, user]
  carts: [carts-db]
  catalogue: [catalogue-db]
  user: [user-db]
  shipping: [rabbitmq]
  queue-master: [rabbitmq]

# --- kpi_inventory (auto-generated by scripts/extract_kpi_inventory.py) ---
# signal families per source (component/node/hash identifiers stripped) — tells the
# agent which KPIs exist for this dataset, so it can READ them by name instead of guessing.
kpi_inventory:
  log:
    - "log.error_count"
    - "log.row_count"
  metric:
    - "cpu"
    - "diskio"
    - "error"
    - "latency-50"
    - "latency-90"
    - "mem"
    - "socket"
    - "workload"
