name: rcaeval_re2_ob
raw_dataset_path: tasks/rcaeval/ob
telemetry_root: telemetry/rcaeval/re2-ob
task_id_template: '{task_id}'
task_dir_template: '{telemetry_root}/{idx:04d}'
gt_tz_offset_hours: 0
reasons:
- high CPU usage
- high memory usage
- high disk I/O usage
- network latency
- network packet loss
- socket error
components:
  online_boutique:
  - InboundPassthroughClusterIpv4
  - PassthroughCluster
  - adservice
  - cartservice
  - checkoutservice
  - currencyservice
  - emailservice
  - frontend
  - frontend-check
  - frontend-external
  - frontendservice
  - istio-init
  - paymentservice
  - productcatalogservice
  - recommendationservice
  - redis
  - shippingservice
answer_candidates:
- checkoutservice
- currencyservice
- emailservice
- productcatalogservice
- recommendationservice
hw_edges: {}  # hardware/host co-location (host -> [components]); empty = no data
call_edges:
  checkoutservice: [checkoutservice, currencyservice, emailservice, paymentservice, productcatalogservice]
  frontendservice: [checkoutservice, currencyservice, frontendservice, productcatalogservice, recommendationservice]
  recommendationservice: [productcatalogservice, recommendationservice]

# --- kpi_inventory (auto-generated by scripts/extract_kpi_inventory.py) ---
# signal families per source (component/node/hash identifiers stripped) — tells the
# agent which KPIs exist for this dataset, so it can READ them by name instead of guessing.
kpi_inventory:
  log:
    - "log.error_count"
    - "log.row_count"
  metric:
    - "cpu"
    - "diskio"
    - "error"
    - "latency-50"
    - "latency-90"
    - "mem"
    - "socket"
    - "workload"
  trace:
    - "trace.from_SVC.duration_mean"
    - "trace.from_SVC.duration_p95"
    - "trace.from_SVC.error_rate"
    - "trace.from_SVC.row_count"
    - "trace.to_SVC.duration_mean"
    - "trace.to_SVC.duration_p95"
    - "trace.to_SVC.error_rate"
    - "trace.to_SVC.row_count"
