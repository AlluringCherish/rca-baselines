  ts-admin-travel-service: [ts-admin-travel-service, ts-travel-service, ts-travel2-service]
  ts-assurance-service: [ts-assurance-service]
  ts-auth-service: [ts-auth-service]
  ts-basic-service: [ts-basic-service, ts-price-service, ts-route-service, ts-station-service, ts-train-service]
  ts-config-service: [ts-config-service]
  ts-consign-price-service: [ts-consign-price-service]
  ts-consign-service: [ts-consign-price-service, ts-consign-service]
