name: rcaeval_re2_tt
raw_dataset_path: tasks/rcaeval/tt
telemetry_root: telemetry/rcaeval/re2-tt
task_id_template: '{task_id}'
task_dir_template: '{telemetry_root}/{idx:04d}'
gt_tz_offset_hours: 0
reasons:
- high CPU usage
- high memory usage
- high disk I/O usage
- network latency
- network packet loss
- socket error
